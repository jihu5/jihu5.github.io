<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>전공 기초 중국어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F9F7F5;--surface:#FFFFFF;--raised:#F3EFE9;--border:#E8E1D8;--border-md:#D5CBBF;
  --t1:#1C1917;--t2:#5C5249;--t3:#A09288;
  --coral:#CC6B4A;--coral-dk:#A8522D;--coral-bg:rgba(204,107,74,.10);
  --green:#2B7252;--green-dk:#1F5440;--green-bg:rgba(43,114,82,.10);
  --red:#C23B2A;--red-bg:rgba(194,59,42,.10);
  --gold:#B98728;--gold-dk:#8A641A;--gold-bg:rgba(185,135,40,.12);
  --blue:#3E72B2;--blue-dk:#2D5386;--blue-bg:rgba(62,114,178,.10);
  --gray-bg:rgba(160,148,136,.12);
  --teal:#2B7A78;--teal-dk:#1A5250;--teal-bg:rgba(43,122,120,.12);
  --f-ui:'Inter',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --f-hanzi:'Noto Serif SC','Songti SC','STSong',serif;
  --f-pinyin:'Inter','Iowan Old Style','Palatino Linotype',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --r1:6px;--r2:10px;--r3:14px;--r4:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font-family:var(--f-ui);color:var(--t1);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
input,button{font-family:inherit;}
.shell{max-width:480px;margin:0 auto;min-height:100vh;padding:20px 16px 52px;}
.header{display:flex;align-items:center;gap:12px;padding-bottom:18px;margin-bottom:20px;border-bottom:1px solid var(--border);}
.logo{width:40px;height:40px;border-radius:10px;background:var(--coral);display:flex;align-items:center;justify-content:center;font-family:var(--f-hanzi);font-size:21px;color:#fff;font-weight:700;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.header-copy{flex:1;min-width:0;}
.header-title{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.2;}
.header-sub{font-size:12px;color:var(--t3);margin-top:1px;font-weight:400;}
.screen{display:none;}
.screen.active{display:block;animation:rise .22s cubic-bezier(.3,0,.2,1);}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:16px;margin-bottom:12px;}
.card-label{font-size:14px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;}
.range-row{display:flex;align-items:flex-end;gap:10px;}
.range-field{flex:1;}
.range-field label{display:block;font-size:12px;font-weight:600;color:var(--t3);letter-spacing:.02em;margin-bottom:4px;}
.range-field input{width:100%;padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--r2);background:var(--raised);color:var(--t1);font-size:19px;font-weight:700;text-align:center;transition:border-color .14s,background .14s;-webkit-appearance:none;}
.range-field input:focus{outline:none;border-color:var(--coral);background:var(--surface);}
.range-sep{color:var(--t3);font-size:17px;padding-bottom:10px;}
.pool-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:var(--r4);margin-top:9px;color:var(--green);background:var(--green-bg);}
.pool-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.pool-badge.warn{color:var(--red);background:var(--red-bg);}
.preset-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.chip{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r4);background:transparent;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .12s;}
.chip:hover{border-color:var(--coral);color:var(--coral);}
.mode-section{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding-bottom:7px;border-bottom:1px solid var(--border);margin:12px 0 8px;}
.mode-section:first-of-type{margin-top:0;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.mode-btn{padding:11px 9px;border:1.5px solid var(--border);border-radius:var(--r2);background:transparent;font-size:15px;font-weight:600;color:var(--t1);cursor:pointer;text-align:center;line-height:1.35;transition:all .12s;}
.mode-btn .sub{display:block;font-size:12px;font-weight:400;color:var(--t3);margin-top:2px;}
.mode-btn.full{grid-column:1/-1;}
.mode-btn.sel{border-color:var(--coral);background:var(--coral-bg);color:var(--coral-dk);}
.mode-btn.sel .sub{color:var(--coral);}
.mode-btn.sel.type-btn{border-color:var(--green);background:var(--green-bg);color:var(--green-dk);}
.mode-btn.sel.type-btn .sub{color:var(--green);}
.count-row{display:flex;gap:7px;flex-wrap:wrap;}
.count-chip{padding:8px 16px;border:1.5px solid var(--border);border-radius:var(--r4);background:transparent;font-size:13.5px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .12s;}
.count-chip.sel{border-color:var(--gold);background:var(--gold-bg);color:var(--gold-dk);}
.count-chip.all-chip.sel{border-color:var(--teal);background:var(--teal-bg);color:var(--teal-dk);}
.all-mode-banner{
  display:none;
  align-items:center;gap:8px;
  margin-top:10px;padding:9px 12px;
  background:var(--teal-bg);border:1px solid rgba(43,122,120,.22);border-radius:var(--r2);
  font-size:12px;font-weight:600;color:var(--teal-dk);line-height:1.5;
}
.all-mode-banner.on{display:flex;}
.all-mode-banner::before{content:'★';font-size:14px;flex-shrink:0;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--r2);font-size:17px;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:background .14s,transform .08s,opacity .15s;}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.10);}
.btn-coral:hover{background:var(--coral-dk);}
.btn-coral:active{transform:scale(.985);}
.btn-coral:disabled{opacity:.38;cursor:not-allowed;transform:none;}
.btn-green{background:var(--green);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.10);}
.btn-green:hover{background:var(--green-dk);}
.btn-green:active{transform:scale(.985);}
.btn-green:disabled{opacity:.38;cursor:not-allowed;transform:none;}
.btn-outline{margin-top:8px;background:var(--surface);color:var(--t1);border:1.5px solid var(--border);}
.btn-outline:hover{background:var(--raised);border-color:var(--border-md);}
.ghost-link{background:none;border:none;padding:0;font-size:12px;font-weight:500;color:var(--t3);text-decoration:underline;cursor:pointer;}
.quiz-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.qb-num{font-size:12px;font-weight:600;color:var(--t3);white-space:nowrap;}
.qb-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.qb-fill{height:100%;background:var(--coral);width:0%;border-radius:2px;transition:width .3s cubic-bezier(.4,0,.2,1);}
.qb-score{font-size:12px;font-weight:700;color:var(--green);white-space:nowrap;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r4);padding:28px 16px 22px;text-align:center;margin-bottom:12px;position:relative;}
.q-pg{position:absolute;top:12px;right:14px;font-size:12px;font-weight:600;color:var(--t3);background:var(--raised);border:1px solid var(--border);padding:2px 9px;border-radius:var(--r4);}
.q-instr{font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--coral-dk);margin-bottom:16px;}
.tzg-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.tz{width:78px;height:78px;border:1.5px solid var(--t1);border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-family:var(--f-hanzi);font-size:44px;color:var(--t1);background-color:var(--surface);padding:0 0 4px;background-image:linear-gradient(to right,transparent calc(50% - .5px),rgba(204,107,74,.22) calc(50% - .5px),rgba(204,107,74,.22) calc(50% + .5px),transparent calc(50% + .5px)),linear-gradient(to bottom,transparent calc(50% - .5px),rgba(204,107,74,.22) calc(50% - .5px),rgba(204,107,74,.22) calc(50% + .5px),transparent calc(50% + .5px));}
.tzg-row.s4 .tz{width:62px;height:62px;font-size:34px;}
.tzg-row.s6 .tz{width:50px;height:50px;font-size:26px;}
.q-pinyin{font-family:var(--f-pinyin);font-size:17px;color:var(--t2);margin-top:6px;letter-spacing:.03em;}
.q-pinyin-big{font-family:var(--f-pinyin);font-size:28px;font-weight:700;color:var(--t1);padding:22px 8px;line-height:1.4;}
.q-meaning{font-size:30px;font-weight:700;padding:22px 0;line-height:1.55;letter-spacing:-.01em;}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
.opt{padding:13px 15px;border:1.5px solid var(--border);border-radius:var(--r2);background:var(--surface);font-size:18px;text-align:left;cursor:pointer;color:var(--t1);transition:all .1s;line-height:1.4;}
.opt:hover:not(:disabled){background:var(--raised);border-color:var(--border-md);}
.opt:disabled{cursor:default;}
.opt.ok{border-color:var(--green);background:var(--green-bg);color:var(--green-dk);font-weight:600;}
.opt.bad{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:600;}
.opt .oh{font-family:var(--f-hanzi);font-size:22px;margin-top:-3px;}
.opt .op{font-family:var(--f-pinyin);font-size:18px;margin-top:-3px;}
.t-row{display:flex;gap:6px;flex-wrap:wrap;margin:5px 0;}
.t-badge{display:inline-flex;align-items:baseline;gap:4px;padding:4px 9px;border-radius:var(--r1);font-size:14px;font-weight:700;}
.t-badge .mk{font-size:18px;font-family:var(--f-pinyin);}
.tn0{background:var(--gray-bg);color:var(--t3);}
.tn1{background:var(--blue-bg);color:var(--blue-dk);}
.tn2{background:var(--green-bg);color:var(--green-dk);}
.tn3{background:var(--gold-bg);color:var(--gold-dk);}
.tn4{background:var(--red-bg);color:var(--red);}
.inp-section{display:none;}
.inp-section.on{display:block;}
.ans-field{width:100%;padding:13px 12px;border:1.5px solid var(--border);border-radius:var(--r2);background:var(--raised);color:var(--t1);font-family:var(--f-pinyin);font-size:22px;font-weight:600;letter-spacing:.04em;text-align:center;outline:none;transition:border-color .14s,background .14s;-webkit-appearance:none;margin-bottom:8px;}
.ans-field:focus{border-color:var(--green);background:var(--surface);}
.ans-field:disabled{opacity:.55;}
.preview-strip{display:flex;align-items:center;gap:8px;background:var(--green-bg);border:1px solid rgba(43,114,82,.18);border-radius:var(--r1);padding:7px 11px;margin-bottom:8px;min-height:34px;}
.preview-lbl{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);white-space:nowrap;}
.preview-val{font-family:var(--f-pinyin);font-size:15px !important;font-weight:600;color:var(--green-dk);flex:1;}
.hint{font-size:13px;color:var(--t3);line-height:1.8;margin-bottom:15px;}
.hint strong{color:var(--t2);font-weight:600;}
.hint code{background:var(--raised);border:1px solid var(--border);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--t1);font-family:monospace;}
.feedback{max-height:0;opacity:0;overflow:hidden;border-radius:var(--r2);font-size:14px;font-weight:700;text-align:center;transition:all .22s ease;}
.feedback.on{max-height:220px;opacity:1;padding:12px 14px;margin-top:10px;}
.feedback.ok{background:var(--green-bg);color:var(--green-dk);}
.feedback.bad{background:var(--red-bg);color:var(--red);}
.fb-sub{font-size:14px;font-weight:500;color:var(--t2);align-content:center;display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:5px;}
.fb-ans{display:flex;font-size:15px;font-weight:700;color:var(--green-dk);margin-top:5px;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:5px;}
.result-hero{text-align:center;padding:8px 0;}
.r-num{font-size:56px;font-weight:800;color:var(--coral);letter-spacing:-.04em;line-height:1;font-feature-settings:"tnum";}
.r-denom{font-size:20px;font-weight:500;color:var(--t3);}
.r-msg{font-size:14px;font-weight:500;color:var(--t2);margin-top:6px;}
.review-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.review-row:last-child{border-bottom:none;}
.rev-char{font-family:var(--f-hanzi);font-size:25px;width:42px;text-align:center;flex-shrink:0;color:var(--t1);line-height:1.2;padding-top:3px;}
.rev-body{flex:1;font-size:15px;line-height:1.65;}
.rev-py{font-family:var(--f-pinyin);color:var(--t2);margin-right:5px;}
.rev-meaning{font-weight:600;}
.rev-pg{font-size:14px;font-weight:600;color:var(--t3);flex-shrink:0;padding-top:4px;}
.empty{text-align:center;color:var(--t3);font-size:14px;padding:14px 0;font-weight:500;}
.tone-prev-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
/* 전체 연습 모드 결과 추가 스타일 */
.r-all-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--teal-bg);color:var(--teal-dk);
  border:1px solid rgba(43,122,120,.22);
  padding:4px 12px;border-radius:var(--r4);
  font-size:12px;font-weight:700;margin-top:8px;
}
</style>
</head>
<body>
<div class="shell">

  <header class="header">
    <div class="logo">词</div>
    <div class="header-copy">
      <div class="header-title">전공 기초 중국어</div>
      <div class="header-sub">1학년 1학기</div>
    </div>
  </header>

  <!-- SETUP -->
  <main id="screen-setup" class="screen active">

    <div class="card">
      <div class="card-label">페이지 범위</div>
      <div class="range-row">
        <div class="range-field">
          <label for="start-page">시작</label>
          <input type="number" id="start-page" inputmode="numeric">
        </div>
        <div class="range-sep">–</div>
        <div class="range-field">
          <label for="end-page">끝</label>
          <input type="number" id="end-page" inputmode="numeric">
        </div>
      </div>
      <div id="pool-badge" class="pool-badge"></div>
      <div class="preset-row" id="preset-row"></div>
    </div>

    <div class="card">
      <div class="card-label">퀴즈 유형</div>
      <div class="mode-section">객관식 · 4지선다</div>
      <div class="mode-grid" id="mode-grid">
        <button class="mode-btn" data-mode="h2m">한자 → 뜻<span class="sub">의미 선택</span></button>
        <button class="mode-btn" data-mode="m2h">뜻 → 한자<span class="sub">한자 단어 선택</span></button>
        <button class="mode-btn" data-mode="h2p">한자 → 병음<span class="sub">병음 선택</span></button>
        <button class="mode-btn" data-mode="p2h">병음 → 한자<span class="sub">한자 선택</span></button>
        <button class="mode-btn" data-mode="tone">성조 맞추기<span class="sub">성조 선택</span></button>
        <button class="mode-btn full sel" data-mode="mixed">객관식 랜덤<span class="sub">5가지 유형 무작위</span></button>
      </div>
      <div class="mode-section">주관식 · 직접 입력</div>
      <div class="mode-grid" id="mode-grid-type">
        <button class="mode-btn type-btn" data-mode="h2p_type">병음 쓰기<span class="sub">병음 입력</span></button>
        <button class="mode-btn type-btn" data-mode="tone_type">성조 쓰기<span class="sub">숫자 키로 성조 입력</span></button>
        <button class="mode-btn type-btn full" data-mode="mixed_type">주관식 랜덤<span class="sub">병음·성조 입력 무작위</span></button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">문제 수</div>
      <div class="count-row" id="count-row"></div>
      <!-- 전체 연습 모드 안내 배너 -->
      <div class="all-mode-banner" id="all-mode-banner">
        범위 내 모든 단어를 순서 없이 출제합니다. 오답은 결과 화면에서 확인할 수 있습니다.
      </div>
    </div>

    <button class="btn btn-coral" id="start-btn">퀴즈 시작</button>
  </main>

  <!-- QUIZ -->
  <main id="screen-quiz" class="screen">
    <div class="quiz-bar">
      <span class="qb-num" id="progress-label">1 / 10</span>
      <div class="qb-track"><div class="qb-fill" id="progress-fill"></div></div>
      <span class="qb-score" id="score-label">0점</span>
    </div>
    <div class="q-card">
      <span class="q-pg" id="page-badge">p.0</span>
      <div class="q-instr" id="instruction"></div>
      <div id="question-prompt"></div>
    </div>
    <div class="opts" id="options"></div>
    <div class="inp-section" id="input-section">
      <input type="text" id="answer-input" class="ans-field"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="preview-strip">
        <span class="preview-lbl" id="preview-label">미리보기</span>
        <span class="preview-val" id="preview-text">—</span>
      </div>
      <div class="hint" id="hint-text"></div>
      <button class="btn btn-green" id="submit-btn">확인 (Enter ↵)</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn btn-coral" id="next-btn" style="display:none;margin-top:10px;">다음 문제</button>
    <button class="ghost-link" id="quit-btn"
            style="display:block;text-align:center;width:100%;margin-top:16px;">
      설정으로 돌아가기
    </button>
  </main>

  <!-- RESULT -->
  <main id="screen-result" class="screen">
    <div class="card">
      <div class="result-hero">
        <span class="r-num" id="result-score">0</span><span class="r-denom" id="result-total"> / 10</span>
        <div id="result-all-badge" style="display:none;">
          <span class="r-all-badge">★ 전체 단어 완주</span>
        </div>
        <div class="r-msg" id="result-msg"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">오답 복습</div>
      <div id="review-list"></div>
    </div>
    <button class="btn btn-coral" id="retry-btn">같은 설정으로 다시 풀기</button>
    <button class="btn btn-outline" id="restart-btn">설정 화면으로</button>
  </main>

</div>

/* ── Pinyin converter ── */
const TONE_MAP={
  'a':['a','ā','á','ǎ','à'],'e':['e','ē','é','ě','è'],
  'i':['i','ī','í','ǐ','ì'],'o':['o','ō','ó','ǒ','ò'],
  'u':['u','ū','ú','ǔ','ù'],'ü':['ü','ǖ','ǘ','ǚ','ǜ'],
};
const VSET=new Set(['a','e','i','o','u','ü']);
function toneVowel(v,t){return(TONE_MAP[v]||[v])[t]||v;}
function tonePos(base){
  for(var i=0;i<base.length;i++){if(base[i]==='a'||base[i]==='e')return i;}
  var oi=base.indexOf('ou');if(oi>=0)return oi;
  for(var j=base.length-1;j>=0;j--){if(VSET.has(base[j]))return j;}
  return -1;
}
function cvChunk(chunk){
  var m=chunk.match(/^([a-züA-Z']+)([0-5]?)$/i);
  if(!m)return chunk;
  var base=m[1].toLowerCase().replace(/v/g,'ü').replace(/'/g,'');
  var t=parseInt(m[2])||0;
  if(t<1||t>4)return base;
  var p=tonePos(base);
  if(p<0)return base;
  return base.slice(0,p)+toneVowel(base[p],t)+base.slice(p+1);
}
function rawToPinyin(raw){
  return raw.split(/(\s+)/).map(function(part){
    if(/^\s+$/.test(part))return part;
    var ch=part.match(/[a-züA-Z']+[0-5]?/g);
    return ch?ch.map(cvChunk).join(''):'';
  }).join('');
}
function normP(s){return s.toLowerCase().replace(/[\s'·\u2019\u00b7]/g,'');}
function normT(s){return s.replace(/[^0-5]/g,'');}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function stripTone(p){return p.normalize('NFD').replace(/[\u0300-\u036f]/g,'').normalize('NFC');}
function tzg(hanzi){
  var c=Array.from(hanzi);
  var cls='tzg-row'+(c.length>=5?' s6':c.length>=3?' s4':'');
  return '<div class="'+cls+'">'+c.map(function(x){return'<div class="tz">'+x+'</div>';}).join('')+'</div>';
}
function getDist(word,xk,yk,n){
  var cor=word[yk];
  var pool=shuffle(DATA.filter(function(d){return d[xk]!==word[xk]&&d[yk]!==cor;}));
  var seen=new Set([cor]),out=[];
  for(var i=0;i<pool.length&&out.length<n;i++){if(!seen.has(pool[i][yk])){seen.add(pool[i][yk]);out.push(pool[i][yk]);}}
  if(out.length<n){
    var p2=shuffle(DATA.filter(function(d){return d[yk]!==cor;}));
    for(var j=0;j<p2.length&&out.length<n;j++){if(!seen.has(p2[j][yk])){seen.add(p2[j][yk]);out.push(p2[j][yk]);}}
  }
  return out;
}
function toneDist(cor,n){
  var parts=cor.split('-').length,has0=cor.indexOf('0')!==-1;
  var ch=has0?['0','1','2','3','4']:['1','2','3','4'];
  var seen=new Set([cor]),out=[],t=0;
  while(out.length<n&&t<300){t++;var a=[];for(var i=0;i<parts;i++)a.push(ch[Math.floor(Math.random()*ch.length)]);var c=a.join('-');if(!seen.has(c)){seen.add(c);out.push(c);}}
  return out;
}

/* ── Question builder ── */
var MC=['h2m','m2h','h2p','p2h','tone'];
var TYP=['h2p_type','tone_type'];
function buildQ(word,mode){
  var type=mode;
  if(mode==='mixed')type=MC[Math.floor(Math.random()*MC.length)];
  if(mode==='mixed_type')type=TYP[Math.floor(Math.random()*TYP.length)];
  var cor,opts;
  switch(type){
    case'h2m':cor=word.m;opts=shuffle([cor].concat(getDist(word,'h','m',3)));return{word,type,cor,opts,isTyp:false};
    case'm2h':cor=word.h;opts=shuffle([cor].concat(getDist(word,'m','h',3)));return{word,type,cor,opts,isTyp:false};
    case'h2p':cor=word.p;opts=shuffle([cor].concat(getDist(word,'h','p',3)));return{word,type,cor,opts,isTyp:false};
    case'p2h':cor=word.h;opts=shuffle([cor].concat(getDist(word,'p','h',3)));return{word,type,cor,opts,isTyp:false};
    case'tone':cor=word.t;opts=shuffle([cor].concat(toneDist(cor,3)));return{word,type,cor,opts,isTyp:false};
    case'h2p_type':return{word,type,cor:word.p,isTyp:true};
    case'tone_type':return{word,type,cor:word.t,isTyp:true};
  }
}

  var pb=$('pool-badge');
  if(pool.length<4){
    pb.textContent='이 범위: '+pool.length+'개 (최소 4개 필요)';
    pb.classList.add('warn');$('start-btn').disabled=true;
  }else{
    pb.textContent='이 범위: '+pool.length+'개  (p.'+lo+' – p.'+hi+')';
    pb.classList.remove('warn');$('start-btn').disabled=false;
  }
  refreshCount();
}
$('start-page').addEventListener('input',updatePool);
$('end-page').addEventListener('input',updatePool);

var PRESETS=[
  {l:'전체',lo:PAGE_MIN,hi:PAGE_MAX},{l:'1·2·3과',lo:11,hi:48},
  {l:'4·5과',lo:49,hi:72},{l:'6·7과',lo:73,hi:96},{l:'8·9과',lo:97,hi:120},{l:'10·11·12과',lo:121,hi:156},
];
PRESETS.forEach(function(p){
  var c=document.createElement('button');c.className='chip';c.textContent=p.l;
  c.onclick=function(){$('start-page').value=p.lo;$('end-page').value=p.hi;updatePool();};
  $('preset-row').appendChild(c);
});

/* ── Setup: mode ── */
function initGrid(id){
  document.getElementById(id).querySelectorAll('.mode-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');selMode=btn.dataset.mode;
    });
  });
}
initGrid('mode-grid');initGrid('mode-grid-type');

/* ── Setup: count (일반 + 전체) ── */
var COUNTS=[5,10,20,30];

COUNTS.forEach(function(c,idx){
  var ch=document.createElement('button');
  ch.className='count-chip'+(idx===1?' sel':'');
  ch.textContent=c+'문제';ch.dataset.c=String(c);
  ch.onclick=function(){
    document.querySelectorAll('.count-chip').forEach(function(b){b.classList.remove('sel');});
    ch.classList.add('sel');
    selCount=c;
    selAll=false;
    $('all-mode-banner').classList.remove('on');
  };
  $('count-row').appendChild(ch);
});

/* 전체 단어 연습 칩 */
var allChip=document.createElement('button');
allChip.className='count-chip all-chip';
allChip.id='all-chip';
allChip.dataset.c='all';
allChip.onclick=function(){
  document.querySelectorAll('.count-chip').forEach(function(b){b.classList.remove('sel');});
  allChip.classList.add('sel');
  selAll=true;
  $('all-mode-banner').classList.add('on');
};
$('count-row').appendChild(allChip);

function refreshCount(){
  /* 일반 칩: pool 크기에 따라 표시/숨김 */
  document.querySelectorAll('.count-chip:not(.all-chip)').forEach(function(ch){
    var c=parseInt(ch.dataset.c,10);
    ch.style.display=c<=pool.length?'':'none';
  });
  /* 전체 칩: 항상 보이고, 현재 풀 크기 표시 */
  allChip.textContent='전체 ('+pool.length+'개)';
  allChip.style.display='';

  /* 선택된 일반 칩이 풀보다 크면 자동 조정 */
  if(!selAll){
    var avail=COUNTS.filter(function(c){return c<=pool.length;});
    if(avail.length&&avail.indexOf(selCount)===-1){
      selCount=avail[avail.length-1];
      document.querySelectorAll('.count-chip:not(.all-chip)').forEach(function(ch){
        ch.classList.toggle('sel',parseInt(ch.dataset.c,10)===selCount);
      });
    }
  }
}
selCount=10;
updatePool();

/* ── Start ── */
function buildSession(){
  var n=selAll?pool.length:Math.min(selCount,pool.length);
  questions=shuffle(pool).slice(0,n).map(function(w){return buildQ(w,selMode);});
  qi=0;score=0;wrongs=[];
}

$('start-btn').addEventListener('click',function(){
  buildSession();show('quiz');renderQ();
});
$('quit-btn').addEventListener('click',function(){show('setup');});

/* ── INSTR labels ── */
var INSTR={
  h2m:'이 한자의 뜻으로 알맞은 것은?',m2h:'이 뜻에 해당하는 한자는?',
  h2p:'이 한자의 병음으로 알맞은 것은?',p2h:'이 병음에 해당하는 한자는?',
  tone:'이 단어의 성조로 알맞은 것은?',
  h2p_type:'이 한자의 병음은?',tone_type:'이 단어의 성조는?',
};

/* ── Render question ── */
function renderQ(){
  var q=questions[qi],w=q.word;
  $('progress-label').textContent=(qi+1)+' / '+questions.length;
  $('progress-fill').style.width=(qi/questions.length*100)+'%';
  $('score-label').textContent=score+'점';
  $('page-badge').textContent='p.'+w.pg;
  $('instruction').textContent=INSTR[q.type]||'';

  var ph='';
  switch(q.type){
    case'h2m':ph=tzg(w.h)+'<div class="q-pinyin">'+w.p+'</div>';break;
    case'm2h':ph='<div class="q-meaning">'+w.m+'</div>';break;
    case'h2p':ph=tzg(w.h);break;
    case'p2h':ph='<div class="q-pinyin-big">'+w.p+'</div>';break;
    case'tone':ph=tzg(w.h)+'<div class="q-pinyin">'+stripTone(w.p)+'</div>';break;
    case'h2p_type':ph=tzg(w.h);break;
    case'tone_type':ph=tzg(w.h)+'<div class="q-pinyin">'+stripTone(w.p)+'</div>';break;
  }
  $('question-prompt').innerHTML=ph;
  $('feedback').className='feedback';$('feedback').innerHTML='';
  $('next-btn').style.display='none';

  if(q.isTyp){
    $('options').innerHTML='';$('options').style.display='none';
    $('input-section').classList.add('on');
    var ai=$('answer-input');ai.value='';ai.disabled=false;
    $('submit-btn').disabled=false;
    if(q.type==='h2p_type'){
      $('preview-label').textContent='병음 미리보기';
      $('preview-text').textContent='—';
      $('hint-text').innerHTML=
        '<strong>입력 방법</strong> — 알파벳 뒤에 성조 번호를 붙여 입력<br>'+
        '<code>v</code>=ü&nbsp;&nbsp;<code>1</code>=ˉ&nbsp;<code>2</code>=ˊ&nbsp;<code>3</code>=ˇ&nbsp;<code>4</code>=ˋ&nbsp;<code>0 생략</code>=경성<br>'+
        '예) <code>lao3shi1</code> → lǎoshī&nbsp;&nbsp;·&nbsp;&nbsp;<code>lv3</code> → lǚ';
    }else{
      $('preview-label').textContent='성조 미리보기';
      $('preview-text').innerHTML='—';
      var syl=w.t.split('-').length;
      $('hint-text').innerHTML=
        '<strong>입력 방법</strong> — 각 글자의 성조를 순서대로 입력 (총 <strong>'+syl+'개</strong>)<br>'+
        '<code>1</code>=1성&nbsp;<code>2</code>=2성&nbsp;<code>3</code>=3성&nbsp;<code>4</code>=4성&nbsp;<code>0</code>=경성<br>'+
        '예) <code>31</code> 또는 <code>3-1</code> 또는 <code>3 1</code>';
    }
    setTimeout(function(){ai.focus();},80);
  }else{
    $('input-section').classList.remove('on');
    $('options').style.display='';
    $('options').innerHTML='';
    q.opts.forEach(function(opt){
      var btn=document.createElement('button');
      btn.className='opt';btn.dataset.v=opt;
      if(q.type==='tone')btn.innerHTML=tBadges(opt);
      else if(q.type==='m2h'||q.type==='p2h')btn.innerHTML='<span class="oh">'+opt+'</span>';
      else if(q.type==='h2p')btn.innerHTML='<span class="op">'+opt+'</span>';
      else btn.textContent=opt;
      btn.addEventListener('click',function(){pickMC(btn,opt,q);});
      $('options').appendChild(btn);
    });
  }
}

/* ── MC answer ── */
function pickMC(btn,opt,q){
  if(q.answered)return;q.answered=true;
  var ok=opt===q.cor;
  if(ok)score++;else wrongs.push(q);
  Array.prototype.forEach.call($('options').children,function(b){
    b.disabled=true;
    if(b.dataset.v===q.cor)b.classList.add('ok');
    else if(b===btn)b.classList.add('bad');
  });
  $('score-label').textContent=score+'점';
  showFB(ok,q);
  $('progress-fill').style.width=((qi+1)/questions.length*100)+'%';
  $('next-btn').style.display='block';
}

/* ── Typing answer ── */
$('answer-input').addEventListener('input',function(){
  var raw=$('answer-input').value,q=questions[qi];
  if(!q||!q.isTyp)return;
  if(q.type==='h2p_type'){$('preview-text').textContent=rawToPinyin(raw)||'—';}
  else{$('preview-text').innerHTML=tPrev(raw);}
});
$('answer-input').addEventListener('keydown',function(e){if(e.key==='Enter')submitTyp();});
$('submit-btn').addEventListener('click',submitTyp);

function submitTyp(){
  var q=questions[qi];if(!q||!q.isTyp||q.answered)return;
  var raw=$('answer-input').value.trim();if(!raw)return;
  q.answered=true;$('answer-input').disabled=true;$('submit-btn').disabled=true;
  var ok=false;
  if(q.type==='h2p_type')ok=normP(rawToPinyin(raw))===normP(q.cor);
  else ok=normT(raw)===normT(q.cor);
  if(ok)score++;else wrongs.push(q);
  $('score-label').textContent=score+'점';
  showFBTyp(ok,q,raw);
  $('progress-fill').style.width=((qi+1)/questions.length*100)+'%';
  $('next-btn').style.display='block';
}

/* ── Feedback helpers ── */
function ansDisp(q){
  if(q.type==='tone')return tBadges(q.cor);
  if(q.type==='m2h'||q.type==='p2h')return'<span style="font-family:var(--f-hanzi);font-size:19px;">'+q.cor+'</span>';
  return q.cor;
}
function showFB(ok,q){
  var el=$('feedback');
  el.className='feedback on '+(ok?'ok':'bad');
  if(ok)el.innerHTML='정답입니다! 🎉';
  else el.innerHTML='오답입니다.<span class="fb-ans">정답: '+ansDisp(q)+'</span>';
}
function showFBTyp(ok,q,raw){
  var el=$('feedback');
  el.className='feedback on '+(ok?'ok':'bad');
  if(ok){el.innerHTML='정답입니다! 🎉';}
  else if(q.type==='h2p_type'){
    var cv=rawToPinyin(raw);
    el.innerHTML='오답입니다.'+
      '<span class="fb-sub">내 입력: <span style="font-family:var(--f-pinyin);">'+cv+'</span></span>'+
      '<span class="fb-ans" style="font-family:var(--f-pinyin);">정답: '+q.cor+'</span>';
  }else{
    el.innerHTML='오답입니다.'+
      '<span class="fb-sub">내 입력: '+tPrev(raw)+'</span>'+
      '<span class="fb-ans" style="display:flex;align-items:center;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:5px;">정답: '+tBadges(q.cor)+'</span>';
  }
}

/* ── Next ── */
$('next-btn').addEventListener('click',function(){qi++;if(qi<questions.length)renderQ();else showResult();});

/* ── Result ── */
function showResult(){
  $('result-score').textContent=score;
  $('result-total').textContent=' / '+questions.length;

  /* 전체 단어 배지 표시 여부 */
  $('result-all-badge').style.display=selAll?'block':'none';

  var r=score/questions.length;
  $('result-msg').textContent=r===1?'완벽해요! 다음 페이지 범위로 도전해보세요 🎉':
    r>=.8?'아주 좋아요! 거의 다 맞혔어요 👍':
    r>=.5?'잘하고 있어요. 오답을 한 번 더 살펴보세요':
    '조금 더 연습해볼까요? 오답을 확인해보세요';

  var rl=$('review-list');rl.innerHTML='';
  if(!wrongs.length){
    rl.innerHTML='<div class="empty">오답이 없습니다. 완벽해요!</div>';
  }else{
    wrongs.forEach(function(q){
      var w=q.word,it=document.createElement('div');
      it.className='review-row';
      it.innerHTML='<div class="rev-char">'+w.h+'</div>'+
        '<div class="rev-body"><span class="rev-py">'+w.p+'</span>'+tBadges(w.t)+
        '<div class="rev-meaning">'+w.m+'</div></div>'+
        '<div class="rev-pg">p.'+w.pg+'</div>';
      rl.appendChild(it);
    });
  }
  show('result');
}

$('retry-btn').addEventListener('click',function(){
  buildSession();show('quiz');renderQ();
});
$('restart-btn').addEventListener('click',function(){show('setup');});
</script>
</body>
</html>
